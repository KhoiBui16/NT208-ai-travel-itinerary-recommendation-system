# ============================================
# render.yaml — Render Blueprint (Infrastructure as Code)
# ============================================
# Deploy: Connect GitHub repo → Render auto-detects this file
# Docs: https://render.com/docs/blueprint-spec
# ============================================

databases:
  - name: dulichviet-db
    plan: free
    databaseName: dulichviet
    region: oregon              # Render free tier chỉ có Oregon (US West)
    postgresMajorVersion: "16"

services:
  - type: web
    name: dulichviet-api
    runtime: python
    plan: free
    region: oregon
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Database — Render tự inject connection string từ PostgreSQL instance
      # ⚠️ SAU KHI DEPLOY: vào Dashboard → Environment → sửa DATABASE_URL
      # Thay "postgresql://" thành "postgresql+asyncpg://"
      - key: DATABASE_URL
        fromDatabase:
          name: dulichviet-db
          property: connectionString
      # JWT — Render tự tạo random secret
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: "HS256"
      # Gemini AI — set trong Dashboard sau deploy
      - key: GEMINI_API_KEY
        sync: false
      # CORS — URL Frontend trên Vercel
      - key: FRONTEND_URL
        value: "https://ai-travel-itinerary-recommendation.vercel.app"
      # Production settings
      - key: DEBUG
        value: "False"

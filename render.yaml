# ============================================
# render.yaml — Render Blueprint (Infrastructure as Code)
# ============================================
# Deploy: Connect GitHub repo → Render auto-detects this file
# Docs: https://render.com/docs/blueprint-spec
# ============================================

databases:
  - name: dulichviet-db
    plan: free
    databaseName: dulichviet
    user: postgres
    region: singapore  # Gần Việt Nam nhất

services:
  - type: web
    name: dulichviet-api
    runtime: python
    plan: free
    region: singapore
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Database — lấy từ Render PostgreSQL (cần thêm +asyncpg)
      # ⚠️ SAU KHI DEPLOY: vào Dashboard → Environment → sửa DATABASE_URL
      # Thay "postgresql://" thành "postgresql+asyncpg://"
      - key: DATABASE_URL
        fromDatabase:
          name: dulichviet-db
          property: connectionString
      # JWT — Render tự tạo random secret
      - key: JWT_SECRET_KEY
        generateValue: true
      # Gemini AI — set trong Dashboard sau deploy
      - key: GEMINI_API_KEY
        sync: false
      # CORS — URL Frontend trên Vercel (set sau khi deploy FE)
      - key: FRONTEND_URL
        sync: false
      # Production settings
      - key: DEBUG
        value: "False"
